<html>
    <body>
        <table border="1">
            <tr>
                <th>ID</th>
                <th>CategoryName</th>
            </tr>
            {% for c in category %}
            <tr>
                <td>{{c.id}}</td>
                <td>{{c.title}}</td>
                <td>
                    <a href="/edit-category/{{c.id}}">Edit</a>
                    <a href="/delete-category/{{c.id}}" onclick="return confirm('Are You Sure?')">Delete</a>
                </td>
            </tr>
            {% endfor %}
        </table>
    </body>
</html>
